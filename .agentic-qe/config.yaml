#
# NOTE: Your customizations are PRESERVED when you run "aqe init" again.
# You do NOT need to re-run "aqe init" after editing this file - changes
# take effect immediately. The following settings are merged on reinstall:
#   - domains.enabled (custom domains like visual-accessibility)
#   - domains.disabled
#   - learning.enabled
#   - hooks.* preferences
#   - workers.enabled
#   - agents.maxConcurrent and defaultTimeout

version: "3.11.0"

project:
  name: "valocase-backend"
  root: "C:\Users\cenk_\Desktop\valocase-backend"
  type: "single"

learning:
  enabled: true
  embeddingModel: "auto"
  hnswConfig:
    M: 16
    efConstruction: 200
    efSearch: 100
  qualityThreshold: 0.7
  promotionThreshold: 3
  pretrainedPatterns: true

routing:
  mode: "rules"
  confidenceThreshold: 0.7
  feedbackEnabled: true

# ADR-092: Advisor Strategy — agents consult a stronger model for strategic guidance
# Set provider/model to override auto-detection from environment API keys
advisor:
  # provider: "openrouter"        # openrouter | claude | ollama (auto-detected if not set)
  # model: "anthropic/claude-opus-4.7"  # provider-specific model ID
  # maxUses: "3"                  # per-task advisor call cap
  redact: "strict"                # strict | balanced | off

workers:
  enabled:
    - "pattern-consolidator"
    - "routing-accuracy-monitor"
    - "coverage-gap-scanner"
  intervals:
    pattern-consolidator: 1800000
    coverage-gap-scanner: 3600000
    flaky-test-detector: 7200000
    routing-accuracy-monitor: 900000
  maxConcurrent: 4
  daemonAutoStart: true

hooks:
  claudeCode: true
  preCommit: false
  ciIntegration: false

skills:
  install: true
  installV2: true
  installV3: true
  overwrite: false

domains:
  enabled:
    - "test-generation"
    - "test-execution"
    - "coverage-analysis"
    - "quality-assessment"
    - "defect-intelligence"
    - "requirements-validation"
    - "code-intelligence"
    - "security-compliance"
    - "contract-testing"
    - "visual-accessibility"
    - "chaos-resilience"
    - "learning-optimization"
  disabled:

agents:
  maxConcurrent: 8
  defaultTimeout: 120000
