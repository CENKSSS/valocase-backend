# --- Local development profile ---
# Activated by default (see spring.profiles.active in application.properties).
# These are non-secret local values; safe to keep in the repo.

# --- Datasource (local PostgreSQL) ---
spring.datasource.url=jdbc:postgresql://localhost:5432/valocase_db
spring.datasource.username=postgres
spring.datasource.password=1

# --- JPA / Hibernate (dev logging) ---
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true

# --- CORS ---
# Permissive for editor Play mode / WebGL / browser tooling during development.
valocase.cors.allowed-origins=*
