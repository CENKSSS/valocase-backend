spring.application.name=valocase-backend

# --- Active profile ---
# Local development uses the "dev" profile by default so `mvnw spring-boot:run`
# behaves exactly as before. Override for deployment with the SPRING_PROFILES_ACTIVE
# environment variable (e.g. SPRING_PROFILES_ACTIVE=prod).
spring.profiles.active=${SPRING_PROFILES_ACTIVE:dev}

# --- Server ---
# Honoured by every profile. Defaults to 8080 when SERVER_PORT is unset.
server.port=${SERVER_PORT:8080}

# --- Datasource (shared) ---
# Connection details (url/username/password) live in the per-profile files.
spring.datasource.driver-class-name=org.postgresql.Driver

# --- JPA / Hibernate (shared safe defaults) ---
# Schema is owned by Flyway. Hibernate only validates against it.
spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false

# --- Flyway (shared) ---
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration
spring.flyway.baseline-on-migrate=false

# --- Catalog import ---
# When true, reads classpath:catalog/skins.json + cases.json at startup and
# upserts the catalog (and neutralizes the V3 sample data). Keep false in
# production. Override per-run, e.g. mvnw spring-boot:run -Dspring-boot.run.arguments=--valocase.catalog.import-on-startup=true
valocase.catalog.import-on-startup=false
