# --- Production profile ---
# Activate with SPRING_PROFILES_ACTIVE=prod.
# All sensitive values are read from environment variables — no secrets in the repo.

# --- Datasource (Railway PostgreSQL) ---
# Railway's DATABASE_URL is libpq-style ("postgresql://user:pass@host:5432/db")
# which the JDBC driver/Hikari cannot consume directly. RailwayDatabaseUrlPostProcessor
# rewrites it to a real JDBC URL ("jdbc:postgresql://host:5432/db") before the
# datasource is built, so this placeholder is overridden at startup. Credentials
# are supplied separately via DATABASE_USERNAME / DATABASE_PASSWORD.
spring.datasource.url=${DATABASE_URL}
spring.datasource.username=${DATABASE_USERNAME}
spring.datasource.password=${DATABASE_PASSWORD}

# --- JPA / Hibernate ---
# ddl-auto stays "validate" (inherited from application.properties); SQL logging off.
spring.jpa.show-sql=false

# --- Catalog import ---
# Overrides the shared default (false). On every prod startup the bundled Unity
# catalog (classpath:catalog/skins.json + cases.json) is imported so the real
# cases Unity expects (vandal_basic, vandal_elite, vandal_arcane, ...) exist in
# the DB. The import is transactional, idempotent and repeatable: it upserts
# skins/cases by their stable IDs, replaces each case's drop pool, and
# deactivates the V3 sample_* rows. It never deletes skins/cases and never
# touches wallets, inventories, accounts, battles, upgrades, or transactions.
valocase.catalog.import-on-startup=true

# --- CORS ---
# Comma-separated list of allowed origins, e.g.
#   CORS_ALLOWED_ORIGINS=https://app.valocase.com,https://www.valocase.com
valocase.cors.allowed-origins=${CORS_ALLOWED_ORIGINS}
